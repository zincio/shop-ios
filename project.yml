name: ZincShop
options:
  bundleIdPrefix: io.zinc.zincshop
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Prototype: allow unsigned simulator builds without a development team.
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  ZincShop:
    type: application
    platform: iOS
    sources:
      - path: ZincShop
      - path: Shared
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop
        INFOPLIST_FILE: ZincShop/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZincShop/ZincShop.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ZincShopWidget

  ZincShopWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ZincShopWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.widget
        INFOPLIST_FILE: ZincShopWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"

  ZincShopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZincShopTests
    dependencies:
      - target: ZincShop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.tests
        GENERATE_INFOPLIST_FILE: "YES"
