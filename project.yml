name: ZincShop
options:
  bundleIdPrefix: io.zinc.zincshop
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

# One explicit scheme so Xcode defaults to running the app, not the widget
# extension (running the widget scheme fails: the bundle only contains a Live
# Activity, so SpringBoard has no widget descriptor to show).
schemes:
  ZincShop:
    build:
      targets:
        ZincShop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ZincShopTests

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Real Team ID + automatic signing so the app installs on a physical device
    # (and simulator). Automatic signing provisions the app, the widget, the
    # App Intents, and the Apple Pay merchant entitlement under this team.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: D436KBE6J9
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  ZincShop:
    type: application
    platform: iOS
    sources:
      - path: ZincShop
      - path: Shared
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop
        INFOPLIST_FILE: ZincShop/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZincShop/ZincShop.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ZincShopWidget

  ZincShopWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ZincShopWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.widget
        INFOPLIST_FILE: ZincShopWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"

  ZincShopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZincShopTests
    dependencies:
      - target: ZincShop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.tests
        GENERATE_INFOPLIST_FILE: "YES"
