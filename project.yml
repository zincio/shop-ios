name: ZincShop
options:
  bundleIdPrefix: io.zinc.zincshop
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

# One explicit scheme so Xcode defaults to running the app, not the widget
# extension (running the widget scheme fails: the bundle only contains a Live
# Activity, so SpringBoard has no widget descriptor to show).
schemes:
  ZincShop:
    build:
      targets:
        ZincShop: all
    run:
      config: Debug
      # iOS 27 beta: attaching the debugger enables "backtrace recording" which
      # injects a diagnostics dylib that crashes with
      # "-[OS_dispatch_mach_msg _setContext:]: unrecognized selector".
      # Running without the debugger avoids the injection. XcodeGen can't toggle
      # the backtrace-recording diagnostic directly, and it resets on every
      # regenerate, so we disable debugging here (persists across regen).
      # Re-enable (debugEnabled: true) once iOS 27 ships and the bug is fixed.
      debugEnabled: false
    test:
      config: Debug
      targets:
        - ZincShopTests
        # ZincShopUITests (the AppIntentsTesting end-to-end intent tests) is NOT in
        # this default scheme on purpose: it only compiles under Xcode 27 (iOS 27
        # SDK). Keeping it out lets the standard `xcodebuild test -scheme ZincShop`
        # keep working under the stable Xcode. Run the intent tests via the
        # dedicated `ZincShopIntentTests` scheme under Xcode 27 (see below).

  # Xcode 27-only scheme for the AppIntentsTesting end-to-end intent tests. Run in
  # Xcode 27 (Product ▸ Test) or headless on a real device — these pass only under
  # real development signing; the simulator's ad-hoc signing is rejected by
  # AppIntentsServices (errors 803/800). See ZincShopUITests/BuyProductIntentUITests.swift.
  ZincShopIntentTests:
    build:
      targets:
        ZincShop: all
        ZincShopUITests: [test]
    test:
      config: Debug
      targets:
        - ZincShopUITests

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    # Real Team ID + automatic signing so the app installs on a physical device
    # (and simulator). Automatic signing provisions the app, the widget, the
    # App Intents, and the Apple Pay merchant entitlement under this team.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: D436KBE6J9
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  ZincShop:
    type: application
    platform: iOS
    sources:
      - path: ZincShop
      - path: Shared
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop
        INFOPLIST_FILE: ZincShop/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZincShop/ZincShop.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ZincShopWidget

  ZincShopWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ZincShopWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.widget
        INFOPLIST_FILE: ZincShopWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZincShopWidget/ZincShopWidget.entitlements
        GENERATE_INFOPLIST_FILE: "NO"

  ZincShopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZincShopTests
    dependencies:
      - target: ZincShop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.tests
        GENERATE_INFOPLIST_FILE: "YES"

  # UI-test bundle hosting the AppIntentsTesting end-to-end intent tests. It does
  # NOT compile app sources — it talks to the running app out-of-process, the same
  # way Siri/Shortcuts do, referencing types by string name.
  ZincShopUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ZincShopUITests
    dependencies:
      - target: ZincShop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.zinc.zincshop.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: ZincShop
        # AppIntentsTesting's IntentDefinitions API requires iOS 27 (Xcode 27 SDK);
        # the app itself still targets iOS 18, so raise the floor for just this
        # test bundle.
        IPHONEOS_DEPLOYMENT_TARGET: "27.0"
